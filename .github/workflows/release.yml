name: Release (Windows)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm install

      - name: Build
        run: npm run tauri build -- --target x86_64-pc-windows-msvc

      - name: Upload MSI to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG=${{ github.ref_name }}
          MSI=$(find src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi -name "*.msi" | head -1)
          NSIS=$(find src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis -name "*-setup.exe" | head -1)

          # Create release if it doesn't exist
          gh release view "$TAG" || gh release create "$TAG" --title "$TAG" --notes "Windows build"

          if [ -n "$MSI" ]; then
            gh release upload "$TAG" "$MSI" --clobber
          fi
          if [ -n "$NSIS" ]; then
            gh release upload "$TAG" "$NSIS" --clobber
          fi
