name: Release (Windows)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm install

      - name: Build
        run: npm run tauri build -- --target x86_64-pc-windows-msvc --bundles nsis

      - name: Upload installer to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG=${{ github.ref_name }}
          NSIS=$(find src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis -name "*-setup.exe" 2>/dev/null | head -1)

          # Create release if it doesn't exist
          gh release view "$TAG" 2>/dev/null || gh release create "$TAG" --title "$TAG" --notes "Windows build"

          if [ -n "$NSIS" ]; then
            gh release upload "$TAG" "$NSIS" --clobber
            echo "Uploaded: $NSIS"
          else
            echo "No NSIS installer found"
            exit 1
          fi
