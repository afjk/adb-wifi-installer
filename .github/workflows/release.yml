name: Release (Windows)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: npm run tauri build -- --target x86_64-pc-windows-msvc --bundles nsis

      - name: Upload installer and update manifest to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}
          BUNDLE_DIR="src-tauri/target/x86_64-pc-windows-msvc/release/bundle"

          NSIS=$(find "$BUNDLE_DIR/nsis" -name "*-setup.exe" 2>/dev/null | head -1)
          SIG=$(find "$BUNDLE_DIR" -name "*.sig" 2>/dev/null | head -1)
          echo "NSIS: $NSIS"
          echo "SIG: $SIG"

          # Create release if it doesn't exist
          gh release view "$TAG" 2>/dev/null || gh release create "$TAG" --title "$TAG" --notes "Release $TAG"

          if [ -n "$NSIS" ]; then
            gh release upload "$TAG" "$NSIS" --clobber
            echo "Uploaded installer: $NSIS"
          else
            echo "No NSIS installer found"; exit 1
          fi

          # Build latest.json for auto-updater
          NSIS_FILENAME=$(basename "$NSIS")
          NSIS_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${NSIS_FILENAME}"
          SIG_CONTENT=""
          if [ -n "$SIG" ]; then
            SIG_CONTENT=$(cat "$SIG")
          fi

          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > latest.json <<JSON
          {
            "version": "${VERSION}",
            "notes": "Release ${TAG}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${SIG_CONTENT}",
                "url": "${NSIS_URL}"
              }
            }
          }
          JSON

          gh release upload "$TAG" latest.json --clobber
          echo "Uploaded latest.json"
